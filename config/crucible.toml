[orchestrator]
db_path = "~/.crucible/state.db"
artifact_dir = "~/.crucible/artifacts"
max_cycles = 0              # 0 = unlimited
cycle_cooldown_secs = 60

[vm]
kernel_src = "/home/void/upstream/linux"
guest_rootfs = "/home/void/.crucible/rootfs"
memory = "16G"
cpus = 8
vfio_device = "03:00.0"    # 7900 XT PCI address
boot_timeout_secs = 60
vsock_cid = 3

[measurement]
# "synthetic" drives stress-ng in the guest (no Steam/Wine needed).
# "game" drives a native GPU benchmark (vkmark/glmark2) under MangoHud in
# the game rootfs built by scripts/setup-game-rootfs.sh.
# "steam" drives a real Steam title under weston-headless in the steam
# rootfs built by scripts/setup-steam-rootfs.sh.
mode = "synthetic"
benchmark_args = ["--cpu", "2"]
benchmark_duration_secs = 30
# Native benchmark used when mode = "game": "vkmark" or "glmark2".
game_benchmark = "vkmark"
# Steam app measured when mode = "steam". 570 = Dota 2.
steam_app_id = 570
runs_per_phase = 5
warmup_runs = 1
significance_threshold = 0.05
effect_size_threshold = 0.5
max_stddev_pct = 10

[agents]
model = "claude-sonnet-5"
max_retries = 3
# Steam mode's launch_steam_benchmark RPC blocks for client settle (240s) +
# Fossilize shader pre-processing + asset load + the MangoHud log window —
# ~1000s worst case. The GuestRpc socket timeout is derived from this value.
timeout_secs = 1500
# Per-call Anthropic `max_tokens` cap. Per-agent overrides below win when set.
# Sized to keep a full cycle (5 calls) inside the org's 30k input-tokens/min cap.
max_tokens = 4096

[agents.per_agent_max_tokens]
game_selector = 1024
profiler      = 2048
analyzer      = 4096
optimizer     = 6144
echo          = 512

[agents.optimizer]
max_attempts_per_bottleneck = 3
allowed_layers = ["kernel", "userspace", "tuning"]

[agents.game_player]
enabled = false
